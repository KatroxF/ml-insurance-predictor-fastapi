server {
    listen 80;

    root /usr/share/nginx/html;
    index signup.html;

    # ✅ ADD THIS (fix CSS/JS/images)
    location ~* \.(css|js|png|jpg|jpeg|gif|ico)$ {
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /signup.html;
    }

    # Serve static pages directly (you can keep these)
    location = /login.html {
        try_files /login.html =404;
    }

    location = /signup.html {
        try_files /signup.html =404;
    }

    location = /dashboard.html {
        try_files /dashboard.html =404;
    }

    location = /predict.html {
        try_files /predict.html =404;
    }

    # Backend API routes
    location /login {
        proxy_pass http://backend:8000;
    }

    location /register {
        proxy_pass http://backend:8000;
    }

    location /predict {
        proxy_pass http://backend:8000;
    }
}